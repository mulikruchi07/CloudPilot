<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | CloudPilot</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --primary: #6366f1;
    --primary-dark: #4f46e5;
    --primary-light: #818cf8;
    --accent: #f43f5e;
    --success: #10b981;
    --bg-dark: #0f172a;
    --bg-secondary: #1e293b;
    --text-main: #0f172a;
    --text-secondary: #475569;
    --text-muted: #64748b;
    --text-light: #f8fafc;
    --border: #e2e8f0;
    --card-white: #ffffff;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
  }

  body {
    font-family: 'Manrope', sans-serif;
    background: var(--bg-dark);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  /* Background Effect */
  body::before {
    content: '';
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
    top: -200px;
    right: -200px;
    border-radius: 50%;
  }

  body::after {
    content: '';
    position: absolute;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(129, 140, 248, 0.1) 0%, transparent 70%);
    bottom: -150px;
    left: -150px;
    border-radius: 50%;
  }

  .login-container {
    width: 100%;
    max-width: 440px;
    position: relative;
    z-index: 1;
  }

  .logo-section {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .logo-box {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1rem;
  }

  .logo-icon {
    width: 50px;
    height: 50px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: white;
  }

  .logo-text {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: white;
  }

  .logo-tagline {
    font-size: 14px;
    color: var(--text-muted);
  }

  .login-card {
    background: var(--card-white);
    border-radius: var(--radius-lg);
    padding: 2.5rem;
    box-shadow: var(--shadow-lg);
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .card-header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .card-title {
    font-size: 24px;
    font-weight: 800;
    color: var(--text-main);
    margin-bottom: 8px;
  }

  .card-subtitle {
    font-size: 14px;
    color: var(--text-muted);
  }

  .form-group {
    margin-bottom: 1.25rem;
  }

  .form-label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-main);
    margin-bottom: 8px;
  }

  .input-wrapper {
    position: relative;
  }

  .input-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 16px;
  }

  .form-input {
    width: 100%;
    padding: 12px 16px 12px 48px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: white;
    font-family: inherit;
    font-size: 14px;
    transition: all 0.2s;
  }

  .form-input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.08);
  }

  .form-input::placeholder {
    color: var(--text-muted);
  }

  .password-toggle {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    transition: color 0.2s;
  }

  .password-toggle:hover {
    color: var(--primary);
  }

  .form-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
  }

  .checkbox-wrapper {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .checkbox-wrapper input[type="checkbox"] {
    width: 16px;
    height: 16px;
    cursor: pointer;
    accent-color: var(--primary);
  }

  .checkbox-label {
    font-size: 14px;
    color: var(--text-secondary);
    cursor: pointer;
  }

  .forgot-link {
    font-size: 14px;
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
    transition: color 0.2s;
  }

  .forgot-link:hover {
    color: var(--primary-dark);
  }

  .btn-login {
    width: 100%;
    padding: 13px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: var(--radius-md);
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-login:hover {
    background: var(--primary-dark);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }

  .btn-login:active {
    transform: translateY(0);
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 1.5rem 0;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .divider-text {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
  }

  .social-login {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 1.5rem;
  }

  .btn-social {
    padding: 12px;
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--text-secondary);
  }

  .btn-social:hover {
    background: #f8fafc;
    border-color: var(--primary);
    color: var(--primary);
  }

  .signup-prompt {
    text-align: center;
    font-size: 14px;
    color: var(--text-secondary);
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }

  .signup-link {
    color: var(--primary);
    text-decoration: none;
    font-weight: 700;
    margin-left: 4px;
    transition: color 0.2s;
  }

  .signup-link:hover {
    color: var(--primary-dark);
  }

  .alert {
    padding: 12px 16px;
    border-radius: var(--radius-md);
    margin-bottom: 1.25rem;
    font-size: 14px;
    display: none;
  }

  .alert.error {
    background: rgba(244, 63, 94, 0.1);
    color: var(--accent);
    border: 1px solid rgba(244, 63, 94, 0.2);
  }

  .alert.success {
    background: rgba(16, 185, 129, 0.1);
    color: var(--success);
    border: 1px solid rgba(16, 185, 129, 0.2);
  }

  @media (max-width: 480px) {
    .login-card {
      padding: 2rem 1.5rem;
    }

    .social-login {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>

<div class="login-container">
  <div class="logo-section">
    <div class="logo-box">
      <div class="logo-icon">
        <i class="fas fa-microchip"></i>
      </div>
      <div class="logo-text">CloudPilot</div>
    </div>
    <p class="logo-tagline">Automate Your Workflow, Elevate Your Productivity</p>
  </div>

  <div class="login-card">
    <div class="card-header">
      <h1 class="card-title">Welcome Back</h1>
      <p class="card-subtitle">Sign in to access your dashboard</p>
    </div>

    <div id="alertBox" class="alert"></div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <div class="input-wrapper">
          <i class="input-icon fas fa-envelope"></i>
          <input
            type="email"
            id="email"
            class="form-input"
            placeholder="Enter your email"
            required
          >
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrapper">
          <i class="input-icon fas fa-lock"></i>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="Enter your password"
            required
          >
          <i class="password-toggle fas fa-eye" id="togglePassword"></i>
        </div>
      </div>

      <div class="form-options">
        <div class="checkbox-wrapper">
          <input type="checkbox" id="rememberMe">
          <label class="checkbox-label" for="rememberMe">Remember me</label>
        </div>
        <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
      </div>

      <button type="submit" class="btn-login">
        <i class="fas fa-sign-in-alt"></i>
        Sign In
      </button>
    </form>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">Or continue with</span>
      <div class="divider-line"></div>
    </div>

    <div class="social-login">
      <button class="btn-social" onclick="socialLogin('google')">
        <i class="fab fa-google"></i>
        Google
      </button>
      <button class="btn-social" onclick="socialLogin('github')">
        <i class="fab fa-github"></i>
        GitHub
      </button>
    </div>

    <div class="signup-prompt">
      Don't have an account?
      <a href="signup.html" class="signup-link">Create Account</a>
    </div>
  </div>
</div>

<script>
  // Password toggle
  const togglePassword = document.getElementById('togglePassword');
  const passwordInput = document.getElementById('password');

  togglePassword.addEventListener('click', function() {
    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordInput.setAttribute('type', type);
    this.classList.toggle('fa-eye');
    this.classList.toggle('fa-eye-slash');
  });

  // Form submission
  const loginForm = document.getElementById('loginForm');
  const alertBox = document.getElementById('alertBox');

  loginForm.addEventListener('submit', async function(e) {
    e.preventDefault();

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const rememberMe = document.getElementById('rememberMe').checked;

    // Show loading state
    const submitBtn = loginForm.querySelector('button[type="submit"]');
    const originalText = submitBtn.innerHTML;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
    submitBtn.disabled = true;

    // Simulate API call
    setTimeout(() => {
      // Demo credentials
      if (email === 'demo@cloudpilot.com' && password === 'demo123') {
        showAlert('Login successful! Redirecting...', 'success');
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1000);
      } else {
        showAlert('Invalid email or password. Try demo@cloudpilot.com / demo123', 'error');
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
      }
    }, 1000);
  });

  function showAlert(message, type) {
    alertBox.textContent = message;
    alertBox.className = `alert ${type}`;
    alertBox.style.display = 'block';

    if (type === 'error') {
      setTimeout(() => {
        alertBox.style.display = 'none';
      }, 5000);
    }
  }

  function socialLogin(provider) {
    showAlert(`${provider.charAt(0).toUpperCase() + provider.slice(1)} login coming soon!`, 'error');
  }
</script>

</body>
</html>
