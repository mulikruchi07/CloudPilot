<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In | CloudPilot</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" crossorigin="anonymous">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --primary: #0d7ff2;
    --primary-dark: #0a68cc;
    --primary-light: #818cf8;
    --accent: #f43f5e;
    --success: #10b981;
    --bg-main: #f8fafc;
    --card-white: #ffffff;
    --text-main: #0f172a;
    --text-secondary: #475569;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --radius-md: 12px;
    --radius-lg: 16px;
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
  }

  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  /* Animated Background */
  body::before {
    content: '';
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: float 20s linear infinite;
    z-index: 0;
  }

  @keyframes float {
    from { transform: translate(0, 0); }
    to { transform: translate(-50px, -50px); }
  }

  .login-container {
    width: 100%;
    max-width: 400px;
    position: relative;
    z-index: 1;
  }

  .login-card {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(20px);
    border-radius: var(--radius-lg);
    padding: 2rem 2rem;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    border: 1px solid rgba(255, 255, 255, 0.3);
  }

  .logo-section {
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .logo-icon {
    width: 50px;
    height: 50px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    border-radius: 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: white;
    margin-bottom: 0.75rem;
    box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
  }

  .logo-section h1 {
    font-size: 24px;
    font-weight: 800;
    color: var(--text-main);
    margin-bottom: 6px;
  }

  .logo-section p {
    font-size: 13px;
    color: var(--text-muted);
  }

  .form-group {
    margin-bottom: 1.25rem;
  }

  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-main);
    margin-bottom: 6px;
  }

  .input-wrapper {
    position: relative;
  }

  .input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 14px;
  }

  .form-input {
    width: 100%;
    padding: 11px 14px 11px 40px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: var(--card-white);
    font-family: inherit;
    font-size: 14px;
    transition: all 0.2s;
  }

  .form-input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.08);
  }

  .password-toggle {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    transition: color 0.2s;
  }

  .password-toggle:hover {
    color: var(--primary);
  }

  .forgot-password {
    text-align: right;
    margin-top: -0.5rem;
    margin-bottom: 1.25rem;
  }

  .forgot-password a {
    font-size: 12px;
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
    transition: color 0.2s;
  }

  .forgot-password a:hover {
    color: var(--primary-dark);
  }

  .btn-primary {
    width: 100%;
    background: var(--primary);
    color: white;
    padding: 12px;
    border-radius: var(--radius-md);
    font-weight: 700;
    font-size: 14px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 1rem;
  }

  .btn-primary:hover:not(:disabled) {
    background: var(--primary-dark);
    transform: translateY(-1px);
    box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
  }

  .btn-primary:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 1.25rem 0;
  }

  .divider::before,
  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .divider span {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 600;
  }

  .social-buttons {
    display: grid;
    gap: 10px;
    margin-bottom: 1.25rem;
  }

  .btn-social {
    width: 100%;
    padding: 10px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: var(--card-white);
    color: var(--text-main);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-social:hover {
    background: var(--bg-main);
    border-color: var(--primary);
    transform: translateY(-1px);
  }

  .btn-social i {
    font-size: 16px;
  }

  .signup-link {
    text-align: center;
    font-size: 13px;
    color: var(--text-secondary);
  }

  .signup-link a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 700;
    transition: color 0.2s;
  }

  .signup-link a:hover {
    color: var(--primary-dark);
  }

  .alert {
    padding: 10px 14px;
    border-radius: var(--radius-md);
    font-size: 13px;
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 8px;
    display: none;
  }

  .alert.show {
    display: flex;
  }

  .alert-error {
    background: rgba(239, 68, 68, 0.1);
    color: #dc2626;
    border: 1px solid rgba(239, 68, 68, 0.2);
  }

  .alert-success {
    background: rgba(16, 185, 129, 0.1);
    color: #059669;
    border: 1px solid rgba(16, 185, 129, 0.2);
  }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Responsive */
  @media (max-width: 480px) {
    .login-card {
      padding: 1.5rem 1.25rem;
    }

    .logo-section h1 {
      font-size: 22px;
    }

    .logo-icon {
      width: 45px;
      height: 45px;
      font-size: 22px;
    }
  }
</style>
</head>
<body>

<div class="login-container">
  <div class="login-card">
    <div class="logo-section">
      <div class="logo-icon">
        <i class="fas fa-microchip"></i>
      </div>
      <h1>Welcome Back</h1>
      <p>Sign in to your CloudPilot account</p>
    </div>

    <div id="alertBox" class="alert"></div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <div class="input-wrapper">
          <i class="input-icon fas fa-envelope"></i>
          <input
            type="email"
            id="email"
            class="form-input"
            placeholder="you@example.com"
            required
            autocomplete="email"
          >
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrapper">
          <i class="input-icon fas fa-lock"></i>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          >
          <button type="button" class="password-toggle" onclick="togglePassword()">
            <i class="fas fa-eye" id="passwordIcon"></i>
          </button>
        </div>
      </div>

      <div class="forgot-password">
        <a href="#" onclick="alert('Password reset coming soon!'); return false;">Forgot password?</a>
      </div>

      <button type="submit" class="btn-primary" id="submitBtn">
        <span id="btnText">Sign In</span>
      </button>
    </form>

    <div class="divider">
      <span>Or continue with</span>
    </div>

    <div class="social-buttons">
      <button class="btn-social" onclick="handleGoogleLogin()">
        <i class="fab fa-google"></i>
        <span>Google</span>
      </button>
      <button class="btn-social" onclick="handleGithubLogin()">
        <i class="fab fa-github"></i>
        <span>GitHub</span>
      </button>
    </div>

    <div class="signup-link">
      Don't have an account? <a href="signup.html">Sign up</a>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  // IMPORTANT: Replace with your actual Supabase credentials
  const SUPABASE_URL = 'https://pzrvxyhxfwagexrbisfa.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB6cnZ4eWh4ZndhZ2V4cmJpc2ZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5NDE4NTUsImV4cCI6MjA4NjUxNzg1NX0.egQt4OZ7qKzXepeSM0pf3LZ8N_Qh4AhT8Mu00NSYEA0';

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Check if already logged in
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    window.location.href = 'index.html';
  }

  // Form submission
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');

    // Show loading state
    submitBtn.disabled = true;
    btnText.innerHTML = '<div class="spinner"></div><span>Signing in...</span>';

    try {
      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) throw error;

      showAlert('Success! Redirecting...', 'success');
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1000);

    } catch (error) {
      showAlert(error.message, 'error');
      submitBtn.disabled = false;
      btnText.textContent = 'Sign In';
    }
  });

  // Password toggle
  window.togglePassword = function() {
    const passwordInput = document.getElementById('password');
    const passwordIcon = document.getElementById('passwordIcon');

    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      passwordIcon.classList.remove('fa-eye');
      passwordIcon.classList.add('fa-eye-slash');
    } else {
      passwordInput.type = 'password';
      passwordIcon.classList.remove('fa-eye-slash');
      passwordIcon.classList.add('fa-eye');
    }
  };

  // Social login handlers
  window.handleGoogleLogin = async function() {
    try {
      const { data, error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: window.location.origin + '/index.html'
        }
      });
      if (error) throw error;
    } catch (error) {
      showAlert(error.message, 'error');
    }
  };

  window.handleGithubLogin = async function() {
    try {
      const { data, error } = await supabase.auth.signInWithOAuth({
        provider: 'github',
        options: {
          redirectTo: window.location.origin + '/index.html'
        }
      });
      if (error) throw error;
    } catch (error) {
      showAlert(error.message, 'error');
    }
  };

  // Alert helper
  function showAlert(message, type) {
    const alertBox = document.getElementById('alertBox');
    alertBox.className = `alert alert-${type} show`;
    alertBox.innerHTML = `
      <i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i>
      <span>${message}</span>
    `;

    if (type === 'success') {
      setTimeout(() => {
        alertBox.classList.remove('show');
      }, 3000);
    }
  }
</script>

</body>
</html>
