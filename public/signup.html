<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up | CloudPilot</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" crossorigin="anonymous">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --primary: #6366f1;
    --primary-dark: #4f46e5;
    --primary-light: #818cf8;
    --accent: #f43f5e;
    --success: #10b981;
    --bg-main: #f8fafc;
    --card-white: #ffffff;
    --text-main: #0f172a;
    --text-secondary: #475569;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --radius-md: 12px;
    --radius-lg: 16px;
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
  }

  body {
    font-family: 'Manrope', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  /* Animated Background */
  body::before {
    content: '';
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: float 20s linear infinite;
    z-index: 0;
  }

  @keyframes float {
    from { transform: translate(0, 0); }
    to { transform: translate(-50px, -50px); }
  }

  .signup-container {
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
  }

  .signup-card {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(20px);
    border-radius: var(--radius-lg);
    padding: 2rem 2rem;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    border: 1px solid rgba(255, 255, 255, 0.3);
  }

  .logo-section {
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .logo-icon {
    width: 50px;
    height: 50px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    border-radius: 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: white;
    margin-bottom: 0.75rem;
    box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
  }

  .logo-section h1 {
    font-size: 24px;
    font-weight: 800;
    color: var(--text-main);
    margin-bottom: 6px;
  }

  .logo-section p {
    font-size: 13px;
    color: var(--text-muted);
  }

  .form-group {
    margin-bottom: 1rem;
  }

  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-main);
    margin-bottom: 6px;
  }

  .input-wrapper {
    position: relative;
  }

  .input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 14px;
  }

  .form-input {
    width: 100%;
    padding: 11px 14px 11px 40px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: var(--card-white);
    font-family: inherit;
    font-size: 14px;
    transition: all 0.2s;
  }

  .form-input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.08);
  }

  .password-toggle {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    transition: color 0.2s;
  }

  .password-toggle:hover {
    color: var(--primary);
  }

  .password-strength {
    margin-top: 8px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    display: none;
  }

  .password-strength.show {
    display: block;
  }

  .strength-bar {
    height: 100%;
    width: 0;
    transition: all 0.3s;
    border-radius: 2px;
  }

  .strength-weak { width: 33%; background: #ef4444; }
  .strength-medium { width: 66%; background: #f59e0b; }
  .strength-strong { width: 100%; background: #10b981; }

  .password-hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .checkbox-group {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 1.25rem;
  }

  .checkbox-group input[type="checkbox"] {
    margin-top: 2px;
    width: 16px;
    height: 16px;
    cursor: pointer;
  }

  .checkbox-group label {
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    line-height: 1.4;
  }

  .checkbox-group a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
  }

  .checkbox-group a:hover {
    text-decoration: underline;
  }

  .btn-primary {
    width: 100%;
    background: var(--primary);
    color: white;
    padding: 12px;
    border-radius: var(--radius-md);
    font-weight: 700;
    font-size: 14px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 1rem;
  }

  .btn-primary:hover:not(:disabled) {
    background: var(--primary-dark);
    transform: translateY(-1px);
    box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
  }

  .btn-primary:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 1.25rem 0;
  }

  .divider::before,
  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .divider span {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 600;
  }

  .social-buttons {
    display: grid;
    gap: 10px;
    margin-bottom: 1.25rem;
  }

  .btn-social {
    width: 100%;
    padding: 10px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: var(--card-white);
    color: var(--text-main);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-social:hover {
    background: var(--bg-main);
    border-color: var(--primary);
    transform: translateY(-1px);
  }

  .btn-social i {
    font-size: 16px;
  }

  .login-link {
    text-align: center;
    font-size: 13px;
    color: var(--text-secondary);
  }

  .login-link a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 700;
    transition: color 0.2s;
  }

  .login-link a:hover {
    color: var(--primary-dark);
  }

  .alert {
    padding: 10px 14px;
    border-radius: var(--radius-md);
    font-size: 13px;
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 8px;
    display: none;
  }

  .alert.show {
    display: flex;
  }

  .alert-error {
    background: rgba(239, 68, 68, 0.1);
    color: #dc2626;
    border: 1px solid rgba(239, 68, 68, 0.2);
  }

  .alert-success {
    background: rgba(16, 185, 129, 0.1);
    color: #059669;
    border: 1px solid rgba(16, 185, 129, 0.2);
  }

  .alert-info {
    background: rgba(59, 130, 246, 0.1);
    color: #2563eb;
    border: 1px solid rgba(59, 130, 246, 0.2);
  }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Responsive */
  @media (max-width: 480px) {
    .signup-card {
      padding: 1.5rem 1.25rem;
    }

    .logo-section h1 {
      font-size: 22px;
    }

    .logo-icon {
      width: 45px;
      height: 45px;
      font-size: 22px;
    }
  }
</style>
</head>
<body>

<div class="signup-container">
  <div class="signup-card">
    <div class="logo-section">
      <div class="logo-icon">
        <i class="fas fa-microchip"></i>
      </div>
      <h1>Create Account</h1>
      <p>Start automating with CloudPilot today</p>
    </div>

    <div id="alertBox" class="alert"></div>

    <form id="signupForm">
      <div class="form-group">
        <label class="form-label" for="fullName">Full Name</label>
        <div class="input-wrapper">
          <i class="input-icon fas fa-user"></i>
          <input
            type="text"
            id="fullName"
            class="form-input"
            placeholder="John Doe"
            required
            autocomplete="name"
          >
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <div class="input-wrapper">
          <i class="input-icon fas fa-envelope"></i>
          <input
            type="email"
            id="email"
            class="form-input"
            placeholder="you@example.com"
            required
            autocomplete="email"
          >
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrapper">
          <i class="input-icon fas fa-lock"></i>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="••••••••"
            required
            autocomplete="new-password"
          >
          <button type="button" class="password-toggle" onclick="togglePassword('password', 'passwordIcon')">
            <i class="fas fa-eye" id="passwordIcon"></i>
          </button>
        </div>
        <div id="passwordStrength" class="password-strength">
          <div id="strengthBar" class="strength-bar"></div>
        </div>
        <div class="password-hint">Minimum 8 characters, including uppercase, lowercase, and numbers</div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm Password</label>
        <div class="input-wrapper">
          <i class="input-icon fas fa-lock"></i>
          <input
            type="password"
            id="confirmPassword"
            class="form-input"
            placeholder="••••••••"
            required
            autocomplete="new-password"
          >
          <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword', 'confirmIcon')">
            <i class="fas fa-eye" id="confirmIcon"></i>
          </button>
        </div>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="terms" required>
        <label for="terms">
          I agree to the <a href="#" onclick="alert('Terms coming soon!'); return false;">Terms of Service</a> and <a href="#" onclick="alert('Privacy Policy coming soon!'); return false;">Privacy Policy</a>
        </label>
      </div>

      <button type="submit" class="btn-primary" id="submitBtn">
        <span id="btnText">Create Account</span>
      </button>
    </form>

    <div class="divider">
      <span>Or sign up with</span>
    </div>

    <div class="social-buttons">
      <button class="btn-social" onclick="handleGoogleSignup()">
        <i class="fab fa-google"></i>
        <span>Google</span>
      </button>
      <button class="btn-social" onclick="handleGithubSignup()">
        <i class="fab fa-github"></i>
        <span>GitHub</span>
      </button>
    </div>

    <div class="login-link">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  // IMPORTANT: Replace with your actual Supabase credentials
  const SUPABASE_URL = 'https://pzrvxyhxfwagexrbisfa.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB6cnZ4eWh4ZndhZ2V4cmJpc2ZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5NDE4NTUsImV4cCI6MjA4NjUxNzg1NX0.egQt4OZ7qKzXepeSM0pf3LZ8N_Qh4AhT8Mu00NSYEA0';

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Check if already logged in
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    window.location.href = 'index.html';
  }

  // Password strength checker
  document.getElementById('password').addEventListener('input', function(e) {
    const password = e.target.value;
    const strengthBar = document.getElementById('strengthBar');
    const strengthContainer = document.getElementById('passwordStrength');

    if (password.length === 0) {
      strengthContainer.classList.remove('show');
      return;
    }

    strengthContainer.classList.add('show');

    let strength = 0;
    if (password.length >= 8) strength++;
    if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
    if (/\d/.test(password)) strength++;
    if (/[@$!%*?&]/.test(password)) strength++;

    strengthBar.className = 'strength-bar';
    if (strength <= 1) {
      strengthBar.classList.add('strength-weak');
    } else if (strength <= 2) {
      strengthBar.classList.add('strength-medium');
    } else {
      strengthBar.classList.add('strength-strong');
    }
  });

  // Form submission
  document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const fullName = document.getElementById('fullName').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const terms = document.getElementById('terms').checked;
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');

    // Validation
    if (!terms) {
      showAlert('Please accept the Terms of Service', 'error');
      return;
    }

    if (password !== confirmPassword) {
      showAlert('Passwords do not match', 'error');
      return;
    }

    if (password.length < 8) {
      showAlert('Password must be at least 8 characters', 'error');
      return;
    }

    // Show loading state
    submitBtn.disabled = true;
    btnText.innerHTML = '<div class="spinner"></div><span>Creating account...</span>';

    try {
      const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: {
          data: {
            full_name: fullName
          }
        }
      });

      if (error) throw error;

      showAlert('Account created! Please check your email to verify your account.', 'success');

      // Reset form
      document.getElementById('signupForm').reset();
      document.getElementById('passwordStrength').classList.remove('show');

      // Redirect after 3 seconds
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 3000);

    } catch (error) {
      showAlert(error.message, 'error');
      submitBtn.disabled = false;
      btnText.textContent = 'Create Account';
    }
  });

  // Password toggle
  window.togglePassword = function(inputId, iconId) {
    const passwordInput = document.getElementById(inputId);
    const passwordIcon = document.getElementById(iconId);

    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      passwordIcon.classList.remove('fa-eye');
      passwordIcon.classList.add('fa-eye-slash');
    } else {
      passwordInput.type = 'password';
      passwordIcon.classList.remove('fa-eye-slash');
      passwordIcon.classList.add('fa-eye');
    }
  };

  // Social signup handlers
  window.handleGoogleSignup = async function() {
    try {
      const { data, error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: window.location.origin + '/index.html'
        }
      });
      if (error) throw error;
    } catch (error) {
      showAlert(error.message, 'error');
    }
  };

  window.handleGithubSignup = async function() {
    try {
      const { data, error } = await supabase.auth.signInWithOAuth({
        provider: 'github',
        options: {
          redirectTo: window.location.origin + '/index.html'
        }
      });
      if (error) throw error;
    } catch (error) {
      showAlert(error.message, 'error');
    }
  };

  // Alert helper
  function showAlert(message, type) {
    const alertBox = document.getElementById('alertBox');
    alertBox.className = `alert alert-${type} show`;
    alertBox.innerHTML = `
      <i class="fas fa-${type === 'error' ? 'exclamation-circle' : type === 'success' ? 'check-circle' : 'info-circle'}"></i>
      <span>${message}</span>
    `;
  }
</script>

</body>
</html>
