<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up | CloudPilot</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --primary: #6366f1;
    --primary-dark: #4f46e5;
    --primary-light: #818cf8;
    --accent: #f43f5e;
    --success: #10b981;
    --bg-dark: #0f172a;
    --bg-secondary: #1e293b;
    --text-main: #0f172a;
    --text-secondary: #475569;
    --text-muted: #64748b;
    --text-light: #f8fafc;
    --border: #e2e8f0;
    --card-white: #ffffff;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
  }

  body {
    font-family: 'Manrope', sans-serif;
    background: var(--bg-dark);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
    top: -200px;
    right: -200px;
    border-radius: 50%;
  }

  body::after {
    content: '';
    position: absolute;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(129, 140, 248, 0.1) 0%, transparent 70%);
    bottom: -150px;
    left: -150px;
    border-radius: 50%;
  }

  .signup-container {
    width: 100%;
    max-width: 480px;
    position: relative;
    z-index: 1;
  }

  .logo-section {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .logo-box {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1rem;
  }

  .logo-icon {
    width: 50px;
    height: 50px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: white;
  }

  .logo-text {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: white;
  }

  .logo-tagline {
    font-size: 14px;
    color: var(--text-muted);
  }

  .signup-card {
    background: var(--card-white);
    border-radius: var(--radius-lg);
    padding: 2.5rem;
    box-shadow: var(--shadow-lg);
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .card-header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .card-title {
    font-size: 24px;
    font-weight: 800;
    color: var(--text-main);
    margin-bottom: 8px;
  }

  .card-subtitle {
    font-size: 14px;
    color: var(--text-muted);
  }

  .form-group {
    margin-bottom: 1.25rem;
  }

  .form-label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-main);
    margin-bottom: 8px;
  }

  .input-wrapper {
    position: relative;
  }

  .input-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 16px;
  }

  .form-input {
    width: 100%;
    padding: 12px 16px 12px 48px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: white;
    font-family: inherit;
    font-size: 14px;
    transition: all 0.2s;
  }

  .form-input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.08);
  }

  .form-input::placeholder {
    color: var(--text-muted);
  }

  .password-toggle {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    transition: color 0.2s;
  }

  .password-toggle:hover {
    color: var(--primary);
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .password-strength {
    margin-top: 8px;
    display: none;
  }

  .strength-bar {
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 6px;
  }

  .strength-fill {
    height: 100%;
    width: 0%;
    transition: all 0.3s;
    border-radius: 4px;
  }

  .strength-fill.weak { background: var(--accent); width: 33%; }
  .strength-fill.medium { background: #f59e0b; width: 66%; }
  .strength-fill.strong { background: var(--success); width: 100%; }

  .strength-text {
    font-size: 12px;
    font-weight: 600;
  }

  .strength-text.weak { color: var(--accent); }
  .strength-text.medium { color: #f59e0b; }
  .strength-text.strong { color: var(--success); }

  .terms-wrapper {
    display: flex;
    align-items: start;
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .terms-wrapper input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: var(--primary);
    margin-top: 2px;
  }

  .terms-text {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  .terms-link {
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
  }

  .terms-link:hover {
    text-decoration: underline;
  }

  .btn-signup {
    width: 100%;
    padding: 13px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: var(--radius-md);
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-signup:hover {
    background: var(--primary-dark);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }

  .btn-signup:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 1.5rem 0;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .divider-text {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
  }

  .social-login {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 1.5rem;
  }

  .btn-social {
    padding: 12px;
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--text-secondary);
  }

  .btn-social:hover {
    background: #f8fafc;
    border-color: var(--primary);
    color: var(--primary);
  }

  .login-prompt {
    text-align: center;
    font-size: 14px;
    color: var(--text-secondary);
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }

  .login-link {
    color: var(--primary);
    text-decoration: none;
    font-weight: 700;
    margin-left: 4px;
    transition: color 0.2s;
  }

  .login-link:hover {
    color: var(--primary-dark);
  }

  .alert {
    padding: 12px 16px;
    border-radius: var(--radius-md);
    margin-bottom: 1.25rem;
    font-size: 14px;
    display: none;
  }

  .alert.error {
    background: rgba(244, 63, 94, 0.1);
    color: var(--accent);
    border: 1px solid rgba(244, 63, 94, 0.2);
  }

  .alert.success {
    background: rgba(16, 185, 129, 0.1);
    color: var(--success);
    border: 1px solid rgba(16, 185, 129, 0.2);
  }

  @media (max-width: 480px) {
    .signup-card {
      padding: 2rem 1.5rem;
    }

    .social-login,
    .form-row {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>

<div class="signup-container">
  <div class="logo-section">
    <div class="logo-box">
      <div class="logo-icon">
        <i class="fas fa-microchip"></i>
      </div>
      <div class="logo-text">CloudPilot</div>
    </div>
    <p class="logo-tagline">Automate Your Workflow, Elevate Your Productivity</p>
  </div>

  <div class="signup-card">
    <div class="card-header">
      <h1 class="card-title">Create Account</h1>
      <p class="card-subtitle">Get started with CloudPilot today</p>
    </div>

    <div id="alertBox" class="alert"></div>

    <form id="signupForm">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="firstName">First Name</label>
          <div class="input-wrapper">
            <i class="input-icon fas fa-user"></i>
            <input
              type="text"
              id="firstName"
              class="form-input"
              placeholder="John"
              required
            >
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="lastName">Last Name</label>
          <div class="input-wrapper">
            <i class="input-icon fas fa-user"></i>
            <input
              type="text"
              id="lastName"
              class="form-input"
              placeholder="Doe"
              required
            >
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <div class="input-wrapper">
          <i class="input-icon fas fa-envelope"></i>
          <input
            type="email"
            id="email"
            class="form-input"
            placeholder="john@example.com"
            required
          >
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrapper">
          <i class="input-icon fas fa-lock"></i>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="Create a strong password"
            required
          >
          <i class="password-toggle fas fa-eye" id="togglePassword"></i>
        </div>
        <div class="password-strength" id="passwordStrength">
          <div class="strength-bar">
            <div class="strength-fill" id="strengthFill"></div>
          </div>
          <div class="strength-text" id="strengthText">Weak</div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm Password</label>
        <div class="input-wrapper">
          <i class="input-icon fas fa-lock"></i>
          <input
            type="password"
            id="confirmPassword"
            class="form-input"
            placeholder="Confirm your password"
            required
          >
          <i class="password-toggle fas fa-eye" id="toggleConfirmPassword"></i>
        </div>
      </div>

      <div class="terms-wrapper">
        <input type="checkbox" id="terms" required>
        <label class="terms-text" for="terms">
          I agree to the <a href="#" class="terms-link">Terms of Service</a> and
          <a href="#" class="terms-link">Privacy Policy</a>
        </label>
      </div>

      <button type="submit" class="btn-signup">
        <i class="fas fa-user-plus"></i>
        Create Account
      </button>
    </form>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">Or sign up with</span>
      <div class="divider-line"></div>
    </div>

    <div class="social-login">
      <button class="btn-social" onclick="socialSignup('google')">
        <i class="fab fa-google"></i>
        Google
      </button>
      <button class="btn-social" onclick="socialSignup('github')">
        <i class="fab fa-github"></i>
        GitHub
      </button>
    </div>

    <div class="login-prompt">
      Already have an account?
      <a href="login.html" class="login-link">Sign In</a>
    </div>
  </div>
</div>

<script>
  // Password toggle functionality
  function setupPasswordToggle(toggleId, inputId) {
    const toggle = document.getElementById(toggleId);
    const input = document.getElementById(inputId);

    toggle.addEventListener('click', function() {
      const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
      input.setAttribute('type', type);
      this.classList.toggle('fa-eye');
      this.classList.toggle('fa-eye-slash');
    });
  }

  setupPasswordToggle('togglePassword', 'password');
  setupPasswordToggle('toggleConfirmPassword', 'confirmPassword');

  // Password strength checker
  const passwordInput = document.getElementById('password');
  const strengthIndicator = document.getElementById('passwordStrength');
  const strengthFill = document.getElementById('strengthFill');
  const strengthText = document.getElementById('strengthText');

  passwordInput.addEventListener('input', function() {
    const password = this.value;

    if (password.length === 0) {
      strengthIndicator.style.display = 'none';
      return;
    }

    strengthIndicator.style.display = 'block';

    let strength = 0;
    if (password.length >= 8) strength++;
    if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
    if (/\d/.test(password)) strength++;
    if (/[^a-zA-Z\d]/.test(password)) strength++;

    strengthFill.className = 'strength-fill';
    strengthText.className = 'strength-text';

    if (strength <= 1) {
      strengthFill.classList.add('weak');
      strengthText.classList.add('weak');
      strengthText.textContent = 'Weak';
    } else if (strength <= 2) {
      strengthFill.classList.add('medium');
      strengthText.classList.add('medium');
      strengthText.textContent = 'Medium';
    } else {
      strengthFill.classList.add('strong');
      strengthText.classList.add('strong');
      strengthText.textContent = 'Strong';
    }
  });

  // Form submission
  const signupForm = document.getElementById('signupForm');
  const alertBox = document.getElementById('alertBox');

  signupForm.addEventListener('submit', async function(e) {
    e.preventDefault();

    const firstName = document.getElementById('firstName').value;
    const lastName = document.getElementById('lastName').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const terms = document.getElementById('terms').checked;

    // Validation
    if (password !== confirmPassword) {
      showAlert('Passwords do not match!', 'error');
      return;
    }

    if (password.length < 8) {
      showAlert('Password must be at least 8 characters long!', 'error');
      return;
    }

    if (!terms) {
      showAlert('Please accept the terms and conditions!', 'error');
      return;
    }

    // Show loading state
    const submitBtn = signupForm.querySelector('button[type="submit"]');
    const originalText = submitBtn.innerHTML;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
    submitBtn.disabled = true;

    // Simulate API call
    setTimeout(() => {
      showAlert('Account created successfully! Redirecting to login...', 'success');
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 1500);
    }, 1500);
  });

  function showAlert(message, type) {
    alertBox.textContent = message;
    alertBox.className = `alert ${type}`;
    alertBox.style.display = 'block';

    if (type === 'error') {
      setTimeout(() => {
        alertBox.style.display = 'none';
      }, 5000);
    }
  }

  function socialSignup(provider) {
    showAlert(`${provider.charAt(0).toUpperCase() + provider.slice(1)} signup coming soon!`, 'error');
  }
</script>

</body>
</html>
